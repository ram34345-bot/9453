<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>山海行者 - 原型</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <header class="topbar">
      <div>
        <h1>《山海行者》</h1>
        <p>中國神話風 2D 開放世界 RPG 原型</p>
      </div>
      <div class="topbar-actions">
        <button id="saveBtn">存檔</button>
        <button id="loadBtn">讀檔</button>
        <button id="resetBtn">新遊戲</button>
      </div>
    </header>

    <main class="layout">
      <section class="canvas-wrap card">
        <canvas id="gameCanvas" width="1024" height="640"></canvas>
        <div class="hint" id="hintText">WASD/方向鍵移動，J 攻擊，E 互動，M 上馬，K 技能，B 背包</div>

        <div id="mobileControls" class="mobile-controls">
          <div id="joystickBase" class="joystick-base">
            <div id="joystickStick" class="joystick-stick"></div>
          </div>
          <div class="mobile-buttons">
            <button id="btnAttack">攻擊</button>
            <button id="btnInteract">互動</button>
            <button id="btnSkill">技能</button>
            <button id="btnMount">上馬</button>
          </div>
        </div>
      </section>

      <aside class="panel card">
        <section>
          <h2>角色狀態</h2>
          <div id="playerStats" class="grid"></div>
        </section>

        <section>
          <h2>任務</h2>
          <ul id="questList"></ul>
        </section>

        <section>
          <h2>妖魂契約</h2>
          <ul id="soulList"></ul>
        </section>

        <section>
          <h2>事件日誌</h2>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </main>
  </div>

  <div id="choiceModal" class="modal hidden">
    <div class="modal-card">
      <h3 id="choiceTitle">是否處置妖怪？</h3>
      <p id="choiceDesc"></p>
      <div class="choice-actions">
        <button id="killChoice">斬殺</button>
        <button id="captureChoice">收服</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
